<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>启航 CMS 控制台</title>
    <link rel="stylesheet" href="/styles.css?v=20260314-37" />
  </head>
  <body>
    <div id="app" class="admin-shell" data-boot="loading">
      <aside class="sidebar" aria-label="主导航">
        <div class="sidebar-head">
          <div class="sidebar-branding">
            <div class="brand-mark">启</div>
            <div class="brand-copy">
              <strong>启航 CMS</strong>
              <span>内容控制台</span>
            </div>
          </div>
        </div>

        <nav id="sidebar-nav" class="sidebar-nav"></nav>

        <div class="sidebar-footer">
          <div class="sidebar-utility-list">
            <button id="theme-toggle" class="sidebar-action" type="button" aria-label="切换主题"></button>
          </div>
        </div>

        <button id="sidebar-collapse" class="sidebar-collapse-handle" type="button" aria-label="收起侧边栏"></button>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div class="topbar-copy">
            <div id="topbar-kicker" class="topbar-kicker">CMS</div>
            <div id="topbar-breadcrumb" class="topbar-breadcrumb">Dashboard</div>
            <h1 id="view-title" class="view-title">总览</h1>
          </div>

          <div class="topbar-tools">
            <div class="topbar-status">
              <div id="status-pill" class="status-pill">系统运行正常</div>
            </div>

            <div class="toolbar-actions">
              <button id="topbar-search" class="topbar-icon-button" type="button" aria-label="搜索"></button>
              <button id="topbar-alerts" class="topbar-icon-button" type="button" aria-label="通知"></button>
              <button id="refresh-view" class="topbar-icon-button" type="button" aria-label="刷新"></button>
            </div>
          </div>
        </header>

        <main id="content" class="content"></main>
      </div>
    </div>

    <script src="/app.js?v=20260314-37"></script>
  </body>
</html>
